name: Trigger auto deployment for payment-processing-server

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.PAYMENTPROCESSINGSERVER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PAYMENTPROCESSINGSERVER_REGISTRY_PASSWORD }}
          containerAppName: payment-processing-server
          resourceGroup: payment-processing-rg
          imageToBuild: ghcr.io/fayece/paymentprocessing/payment-processing-server:${{ github.sha }}
