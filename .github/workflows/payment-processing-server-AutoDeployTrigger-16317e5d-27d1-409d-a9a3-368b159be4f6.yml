name: Trigger auto deployment for payment-processing-server

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/payment-processing-server-AutoDeployTrigger-16317e5d-27d1-409d-a9a3-368b159be4f6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PAYMENTPROCESSINGSERVER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.PAYMENTPROCESSINGSERVER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PAYMENTPROCESSINGSERVER_REGISTRY_PASSWORD }}
          containerAppName: payment-processing-server
          resourceGroup: payment-processing-rg
          imageToBuild: ghcr.io/payment-processing-server:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


